name: CI Pipeline - Terraform & dbt

# 1. When does this run? Every time someone opens a Pull Request to main.
on:
  pull_request:
    branches:
      - main

jobs:
  # 2. The Terraform Job
  terraform-plan:
    name: 'Terraform Plan Check'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 🔐 AUTHENTICATE TERRAFORM ROBOT
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
      
      - name: Setup HashiCorp Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Plan
        run: terraform plan -input=false
        env:
          TF_VAR_project_id: "theta-sunlight-491314-n8"
          TF_VAR_region: "us-central1"
          TF_VAR_bucket_name: "ecommerce-datalake-gk"
          TF_VAR_dataset_id: "ecommerce_dw"
          TF_VAR_is_development: true

  # 3. The dbt Job
  dbt-compile:
    name: 'dbt Syntax Check'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./olist_ecommerce 
        
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 🔐 AUTHENTICATE DBT ROBOT
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dbt-bigquery
        run: pip install dbt-bigquery
        
      - name: Run dbt Compile
        run: dbt compile --profiles-dir .